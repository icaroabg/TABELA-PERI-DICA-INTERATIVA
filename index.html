<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela Periódica Interativa</title>

  <!-- Linke seu CSS aqui -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Tabela Periódica</h1>

  <!-- 🔥 LEGENDA DOS GRUPOS -->
  <div class="groups-list">

    <div class="group-item">
      <span class="color-box alkali"></span>
      Alcalinos
    </div>

    <div class="group-item">
      <span class="color-box alkaline"></span>
      Terrosos Alcalinos
    </div>

    <div class="group-item">
      <span class="color-box transition"></span>
      Metais de Transição
    </div>

    <div class="group-item">
      <span class="color-box post-transition"></span>
      Metais Pós-Transição
    </div>

    <div class="group-item">
      <span class="color-box metalloid"></span>
      Metaloides
    </div>

    <div class="group-item">
      <span class="color-box non-metal"></span>
      Não Metais
    </div>

    <div class="group-item">
      <span class="color-box halogen"></span>
      Halogênios
    </div>

    <div class="group-item">
      <span class="color-box noble-gas"></span>
      Gases Nobres
    </div>

    <div class="group-item">
      <span class="color-box lanthanide"></span>
      Lantanídeos
    </div>

    <div class="group-item">
      <span class="color-box actinide"></span>
      Actinídeos
    </div>

  </div>

  <!-- 🔥 CONTAINER PRINCIPAL -->
  <div class="main-container">
    <div id="periodicTable"></div>
  </div>

  <!-- 🔥 OVERLAY DO RESUMO -->
  <div id="element-summary">
    <div id="summary-content">

      <div class="summary-left">
        <img id="summary-image" src="" alt="Imagem do Elemento">
      </div>

      <div class="summary-right">
        <button onclick="closeElement()">Voltar</button>
      </div>
</div>  <!-- Botão para acessar o jogo da memória -->  <a href="http://icaroabg.github.io/Abegoti/" target="_blank">
    </div>
  </div>

  <!-- 🔥 Seu JavaScript -->
  <script src="script.js"></script>

</body>
</html>
