<!DOCTYPE html><html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela Periódica</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .botao-canto {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-size: 16px;
      z-index: 1000;
      transition: background-color 0.3s ease;
    }.botao-canto:hover {
  background-color: #45a049;
}

  </style>
</head>
<body>
  <h1>Tabela Periódica</h1>  <div class="groups-list">
    <div class="groups-left">
      <div class="group-item">
        <div class="color-box alkali"></div>
        <span>Alcalinos</span>
      </div>
      <div class="group-item">
        <div class="color-box alkaline"></div>
        <span>Terrosos Alcalinos</span>
      </div>
      <div class="group-item">
        <div class="color-box transition"></div>
        <span>Metais de Transição</span>
      </div>
      <div class="group-item">
        <div class="color-box post-transition"></div>
        <span>Metais Pós‑Transição</span>
      </div>
      <div class="group-item">
        <div class="color-box metalloid"></div>
        <span>Metaloides</span>
      </div>
    </div>
    <div class="groups-right">
      <div class="group-item">
        <div class="color-box non-metal"></div>
        <span>Não Metais</span>
      </div>
      <div class="group-item">
        <div class="color-box halogen"></div>
        <span>Halogênios</span>
      </div>
      <div class="group-item">
        <div class="color-box noble-gas"></div>
        <span>Gases Nobres</span>
      </div>
      <div class="group-item">
        <div class="color-box lanthanoid"></div>
        <span>Lantanídeos</span>
      </div>
      <div class="group-item">
        <div class="color-box actinoid"></div>
        <span>Actinídeos</span>
      </div>
    </div>
  </div>  <div class="main-container">
    <div id="periodicTable" class="container"></div>
  </div>  <div id="element-summary">
    <div id="summary-content">
      <div class="summary-left">
        <img id="summary-image" src="" alt="Imagem do Elemento">
      </div>
      <div class="summary-right">
        <button onclick="closeElement()">Voltar</button>
      </div>
    </div>
  </div>  <!-- Botão para acessar o jogo da memória -->  <a href="http://icaroabg.github.io/Abegoti/" target="_blank">
    <button class="botao-canto">Ir para o jogo</button>
  </a>  <script src="script.js"></script></body>
</html>
